<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forge Pipeline Visualizer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x2692;</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e0e0e0; overflow: hidden; }

/* Header */
#header { height: 48px; background: #1a1b26; border-bottom: 1px solid #2a2b3d; display: flex; align-items: center; padding: 0 16px; gap: 12px; }
#header .title { font-size: 14px; font-weight: 600; color: #a9b1d6; letter-spacing: 0.5px; }
#header .pipeline-name { font-size: 14px; color: #7aa2f7; font-weight: 500; }
#status-badge { font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.badge-idle { background: #2a2b3d; color: #565f89; }
.badge-waiting { background: #2a2530; color: #bb9af7; animation: badge-pulse 2s ease-in-out infinite; }
.badge-running { background: #1a3a2a; color: #9ece6a; animation: badge-pulse 2s ease-in-out infinite; }
.badge-paused { background: #2a2530; color: #e0af68; }
.badge-success { background: #1a3a2a; color: #9ece6a; }
.badge-stopped { background: #2a2530; color: #e0af68; }
.badge-failed { background: #3a1a1a; color: #f7768e; }
@keyframes badge-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

/* Control buttons */
#controls { display: flex; gap: 6px; align-items: center; }
#controls button { font-size: 11px; padding: 4px 12px; border-radius: 4px; border: 1px solid transparent; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.15s ease; }
#controls button:hover { filter: brightness(1.2); }
#controls button:active { transform: scale(0.97); }
#controls button[hidden] { display: none; }
.btn-start { background: #1a3a2a; color: #9ece6a; border-color: #2a5a3a !important; }
.btn-pause { background: #2a2530; color: #e0af68; border-color: #3a3540 !important; }
.btn-resume { background: #1a2a4a; color: #7aa2f7; border-color: #2a3a5a !important; }
.btn-stop { background: #3a1a1a; color: #f7768e; border-color: #4a2a2a !important; }

#loading-msg { font-size: 12px; color: #565f89; margin-left: auto; }

/* Main layout — Split.js manages sizes */
#main { display: flex; height: calc(100vh - 48px); }
#graph-pane { background: #13141d; overflow: hidden; position: relative; }
#conv-pane { overflow-y: auto; background: #1a1b26; padding: 16px; }

/* Split.js gutter */
.gutter { background: #2a2b3d; cursor: col-resize; flex-shrink: 0; }
.gutter:hover { background: #7aa2f7; }

/* Cytoscape container */
#cy { width: 100%; height: 100%; }

/* Conversation pane */
.conv-empty { color: #565f89; text-align: center; padding: 40px; font-size: 14px; }
.conv-section { margin-bottom: 20px; border: 1px solid #2a2b3d; border-radius: 8px; overflow: hidden; }
.conv-section.selected { border-color: #7aa2f7; }
.conv-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #1e1f2e; cursor: pointer; user-select: none; }
.conv-header:hover { background: #24253a; }
.conv-node-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-unvisited { background: #3b3d56; }
.dot-active { background: #7aa2f7; animation: badge-pulse 1.5s ease-in-out infinite; }
.dot-completed { background: #9ece6a; }
.dot-failed { background: #f7768e; }
.conv-node-name { font-size: 13px; font-weight: 600; color: #a9b1d6; }
.conv-node-label { font-size: 11px; color: #565f89; margin-left: auto; }
.conv-block { padding: 12px 14px; border-top: 1px solid #2a2b3d; }
.conv-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.conv-label-prompt { color: #7aa2f7; }
.conv-label-response { color: #9ece6a; }
.conv-label-status { color: #e0af68; }
.conv-content { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.6; color: #c0caf5; white-space: pre-wrap; word-break: break-word; max-height: 400px; overflow-y: auto; background: #13141d; padding: 10px; border-radius: 4px; }
.conv-content::-webkit-scrollbar { width: 6px; }
.conv-content::-webkit-scrollbar-thumb { background: #3b3d56; border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <span class="title">FORGE</span>
  <span class="pipeline-name" id="pipeline-name">--</span>
  <span id="status-badge" class="badge-idle">IDLE</span>
  <div id="controls">
    <button id="btn-start" class="btn-start" hidden>Start</button>
    <button id="btn-pause" class="btn-pause" hidden>Pause</button>
    <button id="btn-resume" class="btn-resume" hidden>Resume</button>
    <button id="btn-stop" class="btn-stop" hidden>Stop</button>
  </div>
  <span id="loading-msg">Loading graph...</span>
</div>

<div id="main">
  <div id="graph-pane">
    <div id="cy"></div>
  </div>
  <div id="conv-pane">
    <div class="conv-empty" id="conv-empty">Waiting for pipeline to start...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/cytoscape@3/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2/cytoscape-dagre.js"></script>
<script src="https://cdn.jsdelivr.net/npm/split.js@1/dist/split.min.js"></script>
<script>
// === Base URL (handles reverse proxy path prefix) ===
const BASE = (() => {
  const path = window.location.pathname.replace(/\/+$/, '');
  return path || '';
})();

function apiUrl(endpoint) {
  return BASE + endpoint;
}

// === State ===
const state = {
  graph: null,       // parsed Graph JSON (for node metadata)
  cy: null,          // Cytoscape instance
  nodeStates: {},    // node_id -> 'unvisited' | 'active' | 'completed' | 'failed'
  selectedNodeId: null,
};

// === Attribute helpers ===
function getAttr(attrs, key) {
  if (!attrs || !attrs.values) return null;
  const v = attrs.values[key];
  if (!v) return null;
  if (typeof v === 'object') {
    if ('String' in v) return v.String;
    if ('Integer' in v) return v.Integer;
    if ('Boolean' in v) return v.Boolean;
    if ('Float' in v) return v.Float;
  }
  return v;
}

function getShape(node) {
  return getAttr(node.attrs, 'shape') || 'box';
}

function getLabel(nodeId, node) {
  return getAttr(node.attrs, 'label') || nodeId;
}

function isStructuralNode(nodeId) {
  const node = state.graph && state.graph.nodes[nodeId];
  if (!node) return false;
  const shape = getShape(node);
  return shape === 'Mdiamond' || shape === 'Msquare';
}

// Map Graphviz shapes to Cytoscape shapes
function cytoscapeShape(graphvizShape) {
  switch (graphvizShape) {
    case 'Mdiamond': case 'diamond': return 'diamond';
    case 'Msquare': case 'square': return 'rectangle';
    case 'ellipse': case 'circle': return 'ellipse';
    case 'hexagon': return 'hexagon';
    case 'triangle': return 'triangle';
    case 'octagon': return 'octagon';
    case 'parallelogram': return 'rhomboid';
    default: return 'round-rectangle';
  }
}

// === Control Buttons ===
function initControls() {
  document.getElementById('btn-start').addEventListener('click', () => controlAction('start'));
  document.getElementById('btn-pause').addEventListener('click', () => controlAction('pause'));
  document.getElementById('btn-resume').addEventListener('click', () => controlAction('resume'));
  document.getElementById('btn-stop').addEventListener('click', () => controlAction('stop'));
}

async function controlAction(action) {
  try {
    const resp = await fetch(apiUrl(`/api/control/${action}`), { method: 'POST' });
    if (!resp.ok) console.warn(`Control ${action} returned ${resp.status}`);
    const statusResp = await fetch(apiUrl('/api/status'));
    if (statusResp.ok) applyStatus(await statusResp.json());
  } catch (e) {
    console.error(`Control ${action} failed:`, e);
  }
}

function showControls(which) {
  for (const id of ['btn-start', 'btn-pause', 'btn-resume', 'btn-stop']) {
    document.getElementById(id).hidden = !which.includes(id.replace('btn-', ''));
  }
}

// === Init ===
function init() {
  initControls();

  // Init Split.js (before graph — Cytoscape needs a sized container)
  Split(['#graph-pane', '#conv-pane'], {
    sizes: [42, 58],
    minSize: [200, 200],
    gutterSize: 4,
    cursor: 'col-resize',
    onDragEnd: () => { if (state.cy) state.cy.resize(); },
  });

  // Connect WebSocket — graph + status arrive via init message
  connectWebSocket();
}

// Called when WS init message provides the graph
function initGraph(graph) {
  const loadingMsg = document.getElementById('loading-msg');
  state.graph = graph;

  document.getElementById('pipeline-name').textContent =
    getAttr(state.graph.attrs, 'label') || state.graph.id || 'Pipeline';

  // Initialize all nodes as unvisited
  for (const id of Object.keys(state.graph.nodes)) {
    state.nodeStates[id] = 'unvisited';
  }

  // Build Cytoscape elements from Graph JSON
  const elements = buildCytoscapeElements(state.graph);

  // Initialize Cytoscape
  state.cy = cytoscape({
    container: document.getElementById('cy'),
    elements: elements,
    layout: {
      name: 'dagre',
      rankDir: getAttr(state.graph.attrs, 'rankdir') || 'TB',
      nodeSep: 50,
      rankSep: 70,
      edgeSep: 20,
      padding: 30,
    },
    style: [
      {
        selector: 'node',
        style: {
          'label': 'data(label)',
          'text-valign': 'center',
          'text-halign': 'center',
          'font-size': '12px',
          'font-family': '-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif',
          'color': '#c0caf5',
          'background-color': '#1e1f2e',
          'border-width': 1.5,
          'border-color': '#3b3d56',
          'shape': 'data(shape)',
          'width': 'label',
          'height': 'label',
          'padding': '14px',
          'text-wrap': 'wrap',
          'text-max-width': '140px',
          'cursor': 'pointer',
        },
      },
      {
        selector: 'node[?structural]',
        style: {
          'font-size': '10px',
          'padding': '10px',
          'background-color': '#1a1b26',
          'border-style': 'double',
          'border-width': 3,
        },
      },
      {
        selector: 'node.active',
        style: {
          'background-color': '#1a2a4a',
          'border-color': '#7aa2f7',
          'border-width': 2,
        },
      },
      {
        selector: 'node.completed',
        style: {
          'background-color': '#1a3a2a',
          'border-color': '#9ece6a',
        },
      },
      {
        selector: 'node.failed',
        style: {
          'background-color': '#3a1a1a',
          'border-color': '#f7768e',
        },
      },
      {
        selector: 'node.selected',
        style: {
          'border-width': 3,
          'border-color': '#7aa2f7',
          'overlay-color': '#7aa2f7',
          'overlay-opacity': 0.1,
        },
      },
      {
        selector: 'edge',
        style: {
          'width': 1.5,
          'line-color': '#3b3d56',
          'target-arrow-color': '#3b3d56',
          'target-arrow-shape': 'triangle',
          'curve-style': 'bezier',
          'arrow-scale': 0.8,
        },
      },
      {
        selector: 'edge[label]',
        style: {
          'label': 'data(label)',
          'font-size': '10px',
          'color': '#565f89',
          'text-rotation': 'autorotate',
          'text-margin-y': -10,
        },
      },
      {
        selector: 'edge.traversed',
        style: {
          'line-color': '#7aa2f7',
          'target-arrow-color': '#7aa2f7',
          'width': 2,
          'line-style': 'dashed',
          'line-dash-pattern': [8, 4],
        },
      },
    ],
    minZoom: 0.2,
    maxZoom: 5,
    wheelSensitivity: 0.3,
    boxSelectionEnabled: false,
    autounselectify: true,
  });

  state.cy.on('tap', 'node', (evt) => { selectNode(evt.target.id()); });
  state.cy.on('tap', (evt) => { if (evt.target === state.cy) deselectNode(); });

  loadingMsg.textContent = '';
}

// === Build Cytoscape elements from Forge Graph JSON ===
function buildCytoscapeElements(graph) {
  const elements = [];

  // Nodes
  for (const [nodeId, node] of Object.entries(graph.nodes)) {
    const shape = getShape(node);
    const label = getLabel(nodeId, node);
    const isStructural = shape === 'Mdiamond' || shape === 'Msquare';

    elements.push({
      data: {
        id: nodeId,
        label: label,
        shape: cytoscapeShape(shape),
        structural: isStructural,
      },
    });
  }

  // Edges
  for (const edge of graph.edges) {
    const edgeData = {
      id: edge.from + '->' + edge.to,
      source: edge.from,
      target: edge.to,
    };
    const edgeLabel = getAttr(edge.attrs, 'label');
    if (edgeLabel) edgeData.label = edgeLabel;

    elements.push({ data: edgeData });
  }

  return elements;
}

// === WebSocket Connection ===
let ws = null;
let wsReconnectDelay = 1000;

function connectWebSocket() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = proto + '//' + location.host + BASE + '/ws';
  ws = new WebSocket(url);

  ws.onopen = () => {
    wsReconnectDelay = 1000; // reset backoff
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'init') {
        // Server sends graph + status on each WS connect
        if (msg.graph && !state.cy) {
          initGraph(msg.graph);
        }
        if (msg.status) applyStatus(msg.status);
      } else if (msg.type === 'event') {
        handleEvent(msg.data);
      }
    } catch (err) { /* skip unparseable */ }
  };

  ws.onclose = () => {
    // Auto-reconnect with exponential backoff
    setTimeout(() => {
      wsReconnectDelay = Math.min(wsReconnectDelay * 1.5, 10000);
      connectWebSocket();
    }, wsReconnectDelay);
  };

  ws.onerror = () => {
    // onclose will fire after this — reconnect handled there
  };
}

// === Apply initial status ===
function applyStatus(status) {
  switch (status.state) {
    case 'waiting_for_start':
      setBadge('waiting');
      showControls(['start']);
      break;
    case 'not_started':
      setBadge('idle');
      showControls([]);
      break;
    case 'running':
      setBadge('running');
      showControls(['pause', 'stop']);
      for (const nid of (status.active_nodes || [])) setNodeState(nid, 'active');
      for (const nid of (status.completed_nodes || [])) setNodeState(nid, 'completed');
      for (const nid of (status.failed_nodes || [])) setNodeState(nid, 'failed');
      break;
    case 'paused':
      setBadge('paused');
      showControls(['resume', 'stop']);
      for (const nid of (status.active_nodes || [])) setNodeState(nid, 'active');
      for (const nid of (status.completed_nodes || [])) setNodeState(nid, 'completed');
      for (const nid of (status.failed_nodes || [])) setNodeState(nid, 'failed');
      break;
    case 'completed':
      setBadge('success');
      showControls([]);
      for (const nid of (status.completed_nodes || [])) setNodeState(nid, 'completed');
      for (const nid of (status.completed_nodes || [])) {
        if (!isStructuralNode(nid)) {
          fetchArtifact(nid, 'prompt.md');
          fetchArtifact(nid, 'response.md');
          fetchArtifact(nid, 'status.json');
        }
      }
      break;
    case 'stopped':
      setBadge('stopped');
      showControls([]);
      for (const nid of (status.completed_nodes || [])) setNodeState(nid, 'completed');
      break;
    case 'failed':
      setBadge('failed');
      showControls([]);
      break;
    default:
      setBadge('idle');
      showControls([]);
  }
}

// === Event Handling ===
function handleEvent(event) {
  const kind = event.kind;
  if (!kind) return;

  switch (kind.category) {
    case 'pipeline': handlePipelineEvent(kind); break;
    case 'stage': handleStageEvent(kind); break;
    case 'parallel': handleParallelEvent(kind); break;
    case 'interview': handleInterviewEvent(kind); break;
  }
}

function handlePipelineEvent(kind) {
  switch (kind.kind) {
    case 'started':
    case 'resumed':
      setBadge('running');
      showControls(['pause', 'stop']);
      break;
    case 'paused':
      setBadge('paused');
      showControls(['resume', 'stop']);
      break;
    case 'stopped':
      setBadge('stopped');
      showControls([]);
      break;
    case 'completed':
      setBadge('success');
      showControls([]);
      break;
    case 'failed':
      setBadge('failed');
      showControls([]);
      break;
  }
}

function handleStageEvent(kind) {
  const nodeId = kind.node_id;
  if (!nodeId) return;

  switch (kind.kind) {
    case 'started':
      setNodeState(nodeId, 'active');
      markIncomingEdge(nodeId);
      setTimeout(() => fetchArtifact(nodeId, 'prompt.md'), 800);
      break;
    case 'completed':
      setNodeState(nodeId, 'completed');
      fetchArtifact(nodeId, 'response.md');
      fetchArtifact(nodeId, 'status.json');
      break;
    case 'failed':
      if (!kind.will_retry) setNodeState(nodeId, 'failed');
      fetchArtifact(nodeId, 'status.json');
      break;
  }
}

function handleParallelEvent(kind) {
  switch (kind.kind) {
    case 'started':
      setNodeState(kind.node_id, 'active');
      break;
    case 'branch_started':
      if (kind.target_node) {
        setNodeState(kind.target_node, 'active');
        markEdge(kind.node_id, kind.target_node);
      }
      break;
    case 'branch_completed':
      if (kind.target_node) setNodeState(kind.target_node, 'completed');
      break;
    case 'completed':
      setNodeState(kind.node_id, 'completed');
      break;
  }
}

function handleInterviewEvent(kind) {
  switch (kind.kind) {
    case 'started':
      setNodeState(kind.node_id, 'active');
      ensureConvSection(kind.node_id);
      appendConvBlock(kind.node_id, 'prompt', 'Waiting for human input...');
      break;
    case 'completed':
      setNodeState(kind.node_id, 'completed');
      if (kind.selected) appendConvBlock(kind.node_id, 'response', 'Selected: ' + kind.selected);
      break;
    case 'timeout':
      setNodeState(kind.node_id, 'completed');
      appendConvBlock(kind.node_id, 'response', 'Timeout -- default: ' + (kind.default_selected || 'none'));
      break;
  }
}

// === Node State Management (Cytoscape) ===
function setNodeState(nodeId, newState) {
  state.nodeStates[nodeId] = newState;

  // Update Cytoscape node classes
  const cyNode = state.cy.getElementById(nodeId);
  if (cyNode.length) {
    cyNode.removeClass('active completed failed');
    if (newState !== 'unvisited') {
      cyNode.addClass(newState);
    }
  }

  // Update conversation dot
  const dot = document.querySelector(`[data-conv-node="${nodeId}"] .conv-node-dot`);
  if (dot) {
    dot.className = 'conv-node-dot dot-' + newState;
  }

  // Ensure conversation section exists for non-structural nodes
  if (!isStructuralNode(nodeId)) {
    ensureConvSection(nodeId);
  }
}

// === Edge Traversal ===
function markIncomingEdge(toNodeId) {
  if (!state.graph) return;
  for (const edge of state.graph.edges) {
    if (edge.to === toNodeId && state.nodeStates[edge.from] === 'completed') {
      markEdge(edge.from, toNodeId);
      return;
    }
  }
}

function markEdge(fromId, toId) {
  const edgeId = fromId + '->' + toId;
  const cyEdge = state.cy.getElementById(edgeId);
  if (cyEdge.length) {
    cyEdge.addClass('traversed');
  }
}

// === Node Selection ===
function selectNode(nodeId) {
  deselectNode();

  state.selectedNodeId = nodeId;

  // Highlight in graph
  const cyNode = state.cy.getElementById(nodeId);
  if (cyNode.length) cyNode.addClass('selected');

  // Highlight in conversation
  const section = document.querySelector(`[data-conv-node="${nodeId}"]`);
  if (section) {
    section.classList.add('selected');
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function deselectNode() {
  if (state.selectedNodeId) {
    const prev = state.cy.getElementById(state.selectedNodeId);
    if (prev.length) prev.removeClass('selected');
  }
  state.selectedNodeId = null;
  document.querySelectorAll('.conv-section').forEach(s => s.classList.remove('selected'));
}
window.selectNode = selectNode;

// === Conversation Pane ===
function ensureConvSection(nodeId) {
  if (document.querySelector(`[data-conv-node="${nodeId}"]`)) return;

  const empty = document.getElementById('conv-empty');
  if (empty) empty.remove();

  const node = state.graph.nodes[nodeId];
  const label = node ? getLabel(nodeId, node) : nodeId;
  const nodeState = state.nodeStates[nodeId] || 'unvisited';

  const section = document.createElement('div');
  section.className = 'conv-section';
  section.setAttribute('data-conv-node', nodeId);
  section.innerHTML = `
    <div class="conv-header" onclick="selectNode('${escapeAttr(nodeId)}')">
      <span class="conv-node-dot dot-${nodeState}"></span>
      <span class="conv-node-name">${escapeHtml(nodeId)}</span>
      <span class="conv-node-label">${escapeHtml(label)}</span>
    </div>
  `;
  document.getElementById('conv-pane').appendChild(section);
}

function appendConvBlock(nodeId, type, content) {
  ensureConvSection(nodeId);
  const section = document.querySelector(`[data-conv-node="${nodeId}"]`);
  if (!section) return;

  let block = section.querySelector(`.conv-block-${type}`);
  if (block) {
    block.querySelector('.conv-content').textContent = content;
    return;
  }

  block = document.createElement('div');
  block.className = `conv-block conv-block-${type}`;

  const labelClass = type === 'prompt' ? 'conv-label-prompt'
    : type === 'response' ? 'conv-label-response'
    : 'conv-label-status';

  const labelText = type === 'status' ? 'Status' : type.charAt(0).toUpperCase() + type.slice(1);

  block.innerHTML = `
    <div class="conv-label ${labelClass}">${labelText}</div>
    <pre class="conv-content">${escapeHtml(content)}</pre>
  `;
  section.appendChild(block);
  block.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// === Artifact Fetching ===
async function fetchArtifact(nodeId, filename, retries = 3, delay = 600) {
  const type = filename === 'prompt.md' ? 'prompt'
    : filename === 'response.md' ? 'response'
    : 'status';

  for (let i = 0; i < retries; i++) {
    try {
      const resp = await fetch(apiUrl(`/api/artifacts/${encodeURIComponent(nodeId)}/${filename}`));
      if (resp.ok) {
        const content = await resp.text();
        if (content.trim()) {
          appendConvBlock(nodeId, type, content.trim());
          return;
        }
      }
    } catch (e) { /* retry */ }
    if (i < retries - 1) await new Promise(r => setTimeout(r, delay));
  }
}

// === Status Badge ===
function setBadge(status) {
  const badge = document.getElementById('status-badge');
  badge.className = 'badge-' + status;
  const labels = {
    idle: 'IDLE', waiting: 'WAITING', running: 'RUNNING',
    paused: 'PAUSED', stopped: 'STOPPED', success: 'COMPLETED', failed: 'FAILED',
  };
  badge.textContent = labels[status] || status.toUpperCase();
}

// === Utilities ===
function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function escapeAttr(text) {
  return text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// === Boot ===
init();
</script>
